# Builds the Windows version of Kurisu (MSI + NSIS installers) on a real Windows
# runner. Cross-compiling Tauri from Linux isn't practical (WebView2 + the WiX/NSIS
# bundlers are Windows tooling), so this workflow IS the Windows build machine.
#
# - Push to main  → build; installers + bare kurisu.exe land in the run's Artifacts
#                   (Actions tab → the run → "kurisu-windows").
# - Push a v* tag → same, plus a GitHub Release on the repo page with the
#                   installers attached.
# - Manual        → Actions tab → "Windows build" → Run workflow.
name: Windows build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # needed to create the Release on tag pushes
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # NSIS only: one installer exe, with the WebView2 bootstrapper embedded so
      # users never install anything else manually (see tauri.conf.json
      # bundle.windows.webviewInstallMode). tauri downloads WiX/NSIS itself.
      - name: Build
        run: npx tauri build --bundles nsis

      - uses: actions/upload-artifact@v4
        with:
          name: kurisu-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/kurisu.exe

      # Tag pushes also get a proper Release on the repo page.
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/kurisu.exe
