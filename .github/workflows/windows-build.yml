# Builds Kurisu for Windows (single NSIS installer exe, WebView2 bootstrapper
# embedded) and Linux (bare binary), and publishes both to a GitHub release.
#
# - Push to main  → ROLLING release: tag v<base>.<run_number> (base = "version"
#                   from tauri.conf.json, e.g. v1.0.0.123), published with the
#                   installer + Linux binary + SHA-256 sidecars attached. The
#                   previous rolling release is pruned, so /releases/latest
#                   always points at the newest main build — which is what the
#                   in-app updater tracks. No manual tagging needed.
# - Push a v* tag → a normal named release (v1.1.0). Never pruned.
# - Manual        → Actions tab → "Release build" → Run workflow (rolling).
#
# DRAFT-UNTIL-COMPLETE (same shape as NyaaTriggers' release.yml): the release
# is created as a DRAFT, the platform jobs upload assets into it, and a final
# publish job un-drafts it only after BOTH builds succeeded. /releases/latest
# excludes drafts, so the in-app updater never sees a release that is missing
# an asset or a checksum — no update window where installing could fail or a
# platform is left behind. If a build fails, the draft stays invisible, users
# keep updating from the previous complete release, and the next successful
# run's prune sweeps the orphan draft.
#
# The updater downloads the `.sha256` sidecar for its platform asset and fails
# closed without it, so every asset ships one. The app learns its full release
# version via KURISU_BUILD_VERSION (stamped at build time), keeping
# tauri.conf.json/Cargo.toml semver-clean at X.Y.Z.
#
# Cross-compiling Tauri isn't practical (WebView2 + NSIS are Windows tooling),
# so each platform builds on a native runner. Linux uses Ubuntu 22.04 for an
# older glibc baseline.
name: Release build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

# One in-flight build per ref: a newer push supersedes an older still-building one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Resolve tag / version / rolling ONCE and create the release up front, so the
  # platform builds can upload assets into it in any order.
  meta:
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to create the release
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      ver: ${{ steps.v.outputs.ver }}
      rolling: ${{ steps.v.outputs.rolling }}
    steps:
      - uses: actions/checkout@v4

      # Tag pushes release as-is; branch pushes roll v<base>.<run_number>.
      - id: v
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            ROLL=false
          else
            BASE=$(sed -n 's/.*"version": "\([0-9.]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
            if [ -z "$BASE" ]; then echo "::error::no version in tauri.conf.json"; exit 1; fi
            TAG="v${BASE}.${{ github.run_number }}"
            ROLL=true
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "rolling=$ROLL" >> "$GITHUB_OUTPUT"
          echo "Building tag=$TAG rolling=$ROLL"

      # Created as a DRAFT: invisible to /releases/latest (and the release
      # page) until the publish job un-drafts it after both platform builds
      # uploaded their assets. gh resolves drafts by tag for view/upload/edit,
      # so the rest of the pipeline addresses it by tag as before.
      - name: Create the release (draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.v.outputs.tag }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --target "${{ github.sha }}" --title "$TAG" --generate-notes --draft

  build-windows:
    needs: meta
    runs-on: windows-latest
    permissions:
      contents: write # needed to edit releases
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # NSIS only: one installer exe, with the WebView2 bootstrapper embedded so
      # users never install anything else manually (see tauri.conf.json
      # bundle.windows.webviewInstallMode). tauri downloads NSIS itself.
      - name: Build
        run: npx tauri build --bundles nsis
        env:
          KURISU_BUILD_VERSION: ${{ needs.meta.outputs.ver }}

      - uses: actions/upload-artifact@v4
        with:
          name: kurisu-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/kurisu.exe

      # The in-app updater downloads this sidecar and refuses to run an
      # installer whose SHA-256 doesn't match (fails closed when it's missing).
      - name: Write SHA-256 sidecar
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/nsis
          for f in *.exe; do sha256sum "$f" > "$f.sha256"; done

      # Attach the assets to the draft meta created. Plain `gh release upload`
      # (same as the Linux job): it never touches the draft flag, whereas the
      # softprops action re-edits the release and could publish it early.
      - name: Upload Windows build to release
        shell: bash
        run: |
          gh release upload "${{ needs.meta.outputs.tag }}" \
            src-tauri/target/release/bundle/nsis/*.exe \
            src-tauri/target/release/bundle/nsis/*.exe.sha256 \
            src-tauri/target/release/kurisu.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: meta
    runs-on: ubuntu-22.04
    permissions:
      contents: write # needed to edit releases
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - run: npm ci

      # Bare binary only — bundles (deb/rpm/AppImage) aren't the update asset.
      - name: Build
        run: npx tauri build --no-bundle
        env:
          KURISU_BUILD_VERSION: ${{ needs.meta.outputs.ver }}

      # The asset name MUST stay exactly "kurisu" (+ ".sha256" sidecar): that is
      # the name the Linux updater looks up in the release.
      - name: Write SHA-256 sidecar
        working-directory: src-tauri/target/release
        run: sha256sum kurisu > kurisu.sha256

      - name: Upload Linux binary to release
        working-directory: src-tauri/target/release
        run: gh release upload "${{ needs.meta.outputs.tag }}" kurisu kurisu.sha256 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Flip the release from draft to published once BOTH platform builds have
  # uploaded their assets. Until this runs, /releases/latest still points at
  # the previous complete release, so the in-app updater can never offer a
  # half-uploaded build. If either build failed, this job is skipped and the
  # draft stays invisible: users keep the previous release, and the next
  # successful run's prune sweeps the orphan draft.
  publish:
    needs: [meta, build-windows, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release (un-draft)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.meta.outputs.tag }}
        run: |
          gh release edit -R "${{ github.repository }}" "$TAG" --draft=false
          echo "Published $TAG"

  # After a rolling release is published with both assets, delete the
  # superseded rolling releases and their tags. Only 4-segment auto tags
  # (vN.N.N.N) are touched; hand-cut vX.Y.Z releases stay as permanent
  # milestones. Needs publish, so the previous rolling release is never
  # deleted before the new one is visible, and a failed build never deletes
  # the last working release. Orphan DRAFTS from failed or canceled rolling
  # runs match the same tag shape and get swept here too.
  prune-rolling:
    needs: [meta, publish]
    if: needs.meta.outputs.rolling == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete superseded rolling releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: ${{ needs.meta.outputs.tag }}
        run: |
          gh release list -R "${{ github.repository }}" --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease | not) | .tagName' | while read -r t; do
            [ -z "$t" ] && continue
            [ "$t" = "$KEEP" ] && continue
            echo "$t" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' || continue
            echo "Pruning superseded rolling release $t"
            gh release delete -R "${{ github.repository }}" "$t" --cleanup-tag --yes || true
          done
