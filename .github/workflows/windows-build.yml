# Builds the Windows version of Kurisu (single NSIS installer exe, WebView2
# bootstrapper embedded) on a real Windows runner.
#
# - Push to main  → ROLLING release: tag v<base>.<run_number> (base = "version"
#                   from tauri.conf.json, e.g. v0.1.0.123), published with the
#                   installer + bare exe attached. The previous rolling release
#                   is pruned, so /releases/latest always points at the newest
#                   main build. No manual tagging needed (same pattern as
#                   NyaaTriggers).
# - Push a v* tag → a normal named release (v0.2.0). Never pruned.
# - Manual        → Actions tab → "Windows build" → Run workflow (rolling).
#
# Cross-compiling Tauri from Linux isn't practical (WebView2 + NSIS are Windows
# tooling), so this workflow IS the Windows build machine.
name: Windows build

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ["v*"]

# One in-flight build per ref: a newer push supersedes an older still-building one.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # needed to create/edit releases
    outputs:
      tag: ${{ steps.v.outputs.tag }}
      ver: ${{ steps.v.outputs.ver }}
      rolling: ${{ steps.v.outputs.rolling }}
    steps:
      - uses: actions/checkout@v4

      # Tag pushes release as-is; branch pushes roll v<base>.<run_number>.
      - id: v
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
            ROLL=false
          else
            BASE=$(sed -n 's/.*"version": "\([0-9.]*\)".*/\1/p' src-tauri/tauri.conf.json | head -1)
            if [ -z "$BASE" ]; then echo "::error::no version in tauri.conf.json"; exit 1; fi
            TAG="v${BASE}.${{ github.run_number }}"
            ROLL=true
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "ver=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "rolling=$ROLL" >> "$GITHUB_OUTPUT"
          echo "Building tag=$TAG rolling=$ROLL"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # NSIS only: one installer exe, with the WebView2 bootstrapper embedded so
      # users never install anything else manually (see tauri.conf.json
      # bundle.windows.webviewInstallMode). tauri downloads NSIS itself.
      # KURISU_BUILD_VERSION stamps the exact release version (incl. the rolling
      # 4th segment) into the binary for the self-updater, so an installed build
      # compares itself against what the release advertises. Kept out of
      # tauri.conf.json/Cargo.toml, which stay semver-clean at X.Y.Z.
      - name: Build
        run: npx tauri build --bundles nsis
        env:
          KURISU_BUILD_VERSION: ${{ steps.v.outputs.ver }}

      - uses: actions/upload-artifact@v4
        with:
          name: kurisu-windows
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/kurisu.exe

      # The in-app updater downloads this sidecar and refuses to run an
      # installer whose SHA-256 doesn't match (fails closed when it's missing).
      - name: Write SHA-256 sidecar
        shell: bash
        run: |
          cd src-tauri/target/release/bundle/nsis
          for f in *.exe; do sha256sum "$f" > "$f.sha256"; done

      # Publish the release (rolling on main pushes, named on tag pushes).
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sha256
            src-tauri/target/release/kurisu.exe

  # After a rolling release publishes, delete the superseded rolling releases and
  # their tags. Only 4-segment auto tags (vN.N.N.N) are touched; hand-cut vX.Y.Z
  # releases stay as permanent milestones. Runs only on build success, so a failed
  # build never deletes the last working rolling release.
  prune-rolling:
    needs: build
    if: needs.build.outputs.rolling == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete superseded rolling releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP: ${{ needs.build.outputs.tag }}
        run: |
          gh release list --limit 100 --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease | not) | .tagName' | while read -r t; do
            [ -z "$t" ] && continue
            [ "$t" = "$KEEP" ] && continue
            echo "$t" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' || continue
            echo "Pruning superseded rolling release $t"
            gh release delete "$t" --cleanup-tag --yes || true
          done
